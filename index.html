<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Morning Brief</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0f172a; --bg2:#1e293b; --bg3:#263147; --border:#334155;
  --text:#f1f5f9; --text2:#94a3b8; --muted:#64748b;
  --green:#4ade80; --red:#f87171; --teal:#2dd4bf; --violet:#a78bfa;
  --shadow:0 2px 8px rgba(0,0,0,.4);
}
body { font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

.header { background:linear-gradient(160deg,#060f1f 0%,#0f172a 100%); padding:16px 18px 14px; position:sticky; top:0; z-index:200; text-align:center; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--teal),var(--violet)); }
.header-brand { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:5px; }
.header h1    { font-size:26px; font-weight:900; letter-spacing:-.8px; color:var(--text); }
.header-sub   { display:flex; justify-content:center; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
.header-date  { font-size:12px; color:var(--text2); }
.header-update { font-size:10px; color:var(--muted); margin-top:5px; min-height:14px; }

.content { max-width:700px; margin:0 auto; padding:16px 14px 48px; }
.sec-label { font-size:9px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin:20px 0 9px; }
.sec-label:first-child { margin-top:4px; }

/* MARKET CARDS */
.market-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.mcard { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:11px 12px; box-shadow:var(--shadow); }
.mcard.linked { display:block; text-decoration:none; transition:border-color .18s, background .18s; -webkit-tap-highlight-color:transparent; }
.mcard.linked:hover  { background:var(--bg3); border-color:#4d6480; }
.mcard.linked:active { opacity:.8; }
.mcard-label { font-size:9px; font-weight:700; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
.mcard-val   { font-size:15px; font-weight:800; color:var(--text); margin-top:5px; letter-spacing:-.3px; }
.mcard-chg   { font-size:10px; font-weight:700; margin-top:3px; }
.mcard-link  { font-size:8px; color:var(--muted); margin-top:4px; }
.up { color:var(--green); } .dn { color:var(--red); } .neut { color:var(--muted); }

/* STOCK CARDS */
.stock-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.scard { display:block; text-decoration:none; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:11px 12px; box-shadow:var(--shadow); position:relative; overflow:hidden; transition:border-color .18s, background .18s; -webkit-tap-highlight-color:transparent; }
.scard:hover  { background:var(--bg3); border-color:#4d6480; }
.scard:active { opacity:.8; }
.scard::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--teal),var(--violet)); }
.scard-name   { font-size:9px; color:var(--muted); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.scard-ticker { font-size:14px; font-weight:900; color:var(--text); letter-spacing:.3px; margin-top:2px; }
.scard-price  { font-size:15px; font-weight:800; margin-top:7px; letter-spacing:-.3px; }
.scard-change { font-size:10px; font-weight:700; margin-top:2px; }
.scard-link   { font-size:8px; color:var(--muted); margin-top:4px; }

/* SKELETONS */
.skel    { background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%); background-size:200% 100%; animation:sk 1.5s infinite; border-radius:4px; height:12px; margin-top:8px; }
.skel.sm { height:10px; width:60%; margin-top:4px; }
@keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* NEWS */
.news-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
.nitem { display:flex; gap:12px; align-items:flex-start; padding:13px 14px; border-bottom:1px solid var(--border); text-decoration:none; transition:background .12s; }
.nitem:last-child { border-bottom:none; }
.nitem:hover  { background:var(--bg3); }
.nitem:active { opacity:.8; }
.nitem-img { width:40px; height:40px; border-radius:8px; flex-shrink:0; background:var(--bg3); border:1px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.nitem-img img { width:100%; height:100%; object-fit:cover; border-radius:7px; }
.nitem-img-fallback { font-size:15px; font-weight:900; color:var(--muted); }
.nitem-body  { flex:1; min-width:0; }
.nitem-meta  { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); margin-bottom:4px; }
.nsrc        { font-weight:700; color:var(--text2); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ndot        { color:var(--border); flex-shrink:0; }
.nitem-title { font-size:12.5px; font-weight:700; color:var(--text); line-height:1.4; margin-bottom:4px; }
.nitem-desc  { font-size:11px; color:var(--text2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

.n-empty { padding:32px 14px; text-align:center; }
.n-empty-icon  { font-size:32px; margin-bottom:10px; }
.n-empty-title { font-size:14px; font-weight:700; color:var(--text2); margin-bottom:6px; }
.n-empty-text  { font-size:11px; color:var(--muted); line-height:1.6; }
.n-error { padding:16px; font-size:11px; color:var(--red); text-align:center; }
.n-loading { padding:14px; }
.nsh   { height:11px; background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%); background-size:200% 100%; animation:sk 1.5s infinite; border-radius:4px; margin-bottom:8px; }
.nsh.s { width:55%; }

@media (max-width:380px) {
  .header h1 { font-size:22px; } .mcard-val { font-size:13px; }
  .scard-price { font-size:13px; } .nitem-title { font-size:12px; }
  .nitem-img { width:34px; height:34px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">esthetic med &nbsp;·&nbsp; medical esthetic</div>
  <h1>Morning Brief</h1>
  <div class="header-sub">
    <span class="header-date" id="hDate">–</span>
  </div>
  <div class="header-update" id="hUpdate"></div>
</header>

<div class="content">

  <div class="sec-label">Währungen &amp; Markt</div>
  <div class="market-grid">
    <div class="mcard">
      <div class="mcard-label">EUR / CHF</div>
      <div class="mcard-val" id="eurVal">–</div>
      <div class="mcard-chg neut" id="eurChg">–</div>
    </div>
    <div class="mcard">
      <div class="mcard-label">USD / CHF</div>
      <div class="mcard-val" id="usdVal">–</div>
      <div class="mcard-chg neut" id="usdChg">–</div>
    </div>
    <a class="mcard linked" href="https://finance.yahoo.com/quote/BTC-USD/" target="_blank" rel="noopener">
      <div class="mcard-label">Bitcoin / USD</div>
      <div class="mcard-val" id="btcVal">–</div>
      <div class="mcard-chg neut" id="btcChg">–</div>
      <div class="mcard-link">↗ Yahoo Finance</div>
    </a>
  </div>

  <div class="sec-label">Partner-Aktien (NASDAQ)</div>
  <div class="stock-grid">
    <a class="scard" id="sc-ESTA" href="https://finance.yahoo.com/quote/ESTA/" target="_blank" rel="noopener">
      <div class="scard-name">Establishment Labs</div><div class="scard-ticker">ESTA</div>
      <div class="skel"></div><div class="skel sm"></div>
    </a>
    <a class="scard" id="sc-APYX" href="https://finance.yahoo.com/quote/APYX/" target="_blank" rel="noopener">
      <div class="scard-name">Apyx Medical</div><div class="scard-ticker">APYX</div>
      <div class="skel"></div><div class="skel sm"></div>
    </a>
    <a class="scard" id="sc-IART" href="https://finance.yahoo.com/quote/IART/" target="_blank" rel="noopener">
      <div class="scard-name">Integra LifeSci.</div><div class="scard-ticker">IART</div>
      <div class="skel"></div><div class="skel sm"></div>
    </a>
  </div>

  <div class="sec-label">News &amp; Radar</div>
  <div class="news-wrap">
    <div id="newsFeed">
      <div class="n-loading"><div class="nsh"></div><div class="nsh s"></div><div class="nsh"></div><div class="nsh s"></div><div class="nsh"></div><div class="nsh s"></div></div>
    </div>
  </div>

</div>

<script>
const DATA_URL = 'data.json';

const STOCK_INFO = {
  ESTA:{name:'Establishment Labs'}, APYX:{name:'Apyx Medical'}, IART:{name:'Integra LifeSci.'}
};

function numCH(n, dec) {
  if (n===null||n===undefined||isNaN(Number(n))) return '–';
  const s=Number(n).toFixed(dec??2).split('.');
  s[0]=s[0].replace(/\B(?=(\d{3})+(?!\d))/g,"'");
  return s.join('.');
}
function usdFmt(n)  { return '$\u00a0'+numCH(n,0); }
function pct(n,sign=true) {
  if(n===null||n===undefined) return '–';
  return (sign&&Number(n)>=0?'+':'')+numCH(n,2)+'%';
}

function setDateTime() {
  const D=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const M=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const now=new Date();
  document.getElementById('hDate').textContent=
    D[now.getDay()]+', '+now.getDate()+'. '+M[now.getMonth()]+' '+now.getFullYear();
}

function showUpdateTime(isoStr) {
  try {
    const d=new Date(isoStr);
    const t=d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});
    document.getElementById('hUpdate').textContent='Daten von heute '+t+' Uhr';
  } catch(e){}
}

function getDomain(url) { try{return new URL(url).hostname.replace(/^www\./,'');}catch(e){return '';} }
function faviconUrl(url) { const d=getDomain(url); return d?'https://www.google.com/s2/favicons?domain='+d+'&sz=64':''; }
function initials(s) { return (s||'?').replace(/^(The|Der|Die|Das|Le|La|Les)\s+/i,'').charAt(0).toUpperCase(); }

function renderForex(forex) {
  const pairs=[['eur_chf','eurVal','eurChg'],['usd_chf','usdVal','usdChg']];
  pairs.forEach(([key,valId,chgId])=>{
    const f=forex[key]||{};
    document.getElementById(valId).textContent=f.rate?numCH(f.rate,4):'–';
    const el=document.getElementById(chgId);
    if(f.changePct!==null&&f.changePct!==undefined) {
      el.textContent=pct(f.changePct)+' (24h)';
      el.className='mcard-chg '+(f.changePct>=0?'up':'dn');
    } else { el.textContent='–'; el.className='mcard-chg neut'; }
  });
}

function renderBitcoin(btc) {
  document.getElementById('btcVal').textContent=btc.price?usdFmt(btc.price):'–';
  const el=document.getElementById('btcChg');
  if(btc.changePct!==null&&btc.changePct!==undefined) {
    el.textContent=pct(btc.changePct)+' (24h)';
    el.className='mcard-chg '+(btc.changePct>=0?'up':'dn');
  } else { el.textContent='–'; el.className='mcard-chg neut'; }
}

function renderStocks(stocks) {
  stocks.forEach(s=>{
    const el=document.getElementById('sc-'+s.ticker);
    if(!el)return;
    const info=STOCK_INFO[s.ticker]||{};
    const cls=Number(s.changePct)>=0?'up':'dn';
    el.innerHTML=
      '<div class="scard-name">'+(info.name||s.ticker)+'</div>'+
      '<div class="scard-ticker">'+s.ticker+'</div>'+
      '<div class="scard-price '+cls+'">$'+numCH(s.price,2)+'</div>'+
      '<div class="scard-change '+cls+'">'+pct(s.changePct)+' ('+(Number(s.changePct)>=0?'+':'')+numCH(s.change,2)+')</div>'+
      '<div class="scard-link">↗ Yahoo Finance</div>';
  });
}

function imgHtml(url, source) {
  const fav=faviconUrl(url), init=initials(source);
  return fav
    ? '<div class="nitem-img"><img src="'+fav+'" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=nitem-img-fallback>'+init+'</div>\'"></div>'
    : '<div class="nitem-img"><div class="nitem-img-fallback">'+init+'</div></div>';
}

function renderNews(news) {
  const feed=document.getElementById('newsFeed');
  if(!news||!news.length){
    feed.innerHTML='<div class="n-empty"><div class="n-empty-icon">📭</div><div class="n-empty-title">Noch keine News verfügbar</div><div class="n-empty-text">Die Daten werden täglich um 06:00 Uhr aktualisiert.</div></div>';
    return;
  }
  feed.innerHTML=news.map(i=>
    '<a href="'+(i.url||'#')+'" target="_blank" rel="noopener noreferrer" class="nitem">'+
      imgHtml(i.url||'',i.source||'')+
      '<div class="nitem-body">'+
        '<div class="nitem-meta">'+
          (i.source?'<span class="nsrc">'+i.source+'</span><span class="ndot">·</span>':'')+
          '<span>'+(i.ago||'')+'</span>'+
        '</div>'+
        '<div class="nitem-title">'+(i.title||'')+'</div>'+
        (i.summary?'<div class="nitem-desc">'+i.summary+'</div>':'')+
      '</div>'+
    '</a>'
  ).join('');
}

function showNoData() {
  // Show empty state in all sections
  Object.keys(STOCK_INFO).forEach(t=>{
    document.getElementById('sc-'+t).innerHTML=
      '<div class="scard-name">'+STOCK_INFO[t].name+'</div>'+
      '<div class="scard-ticker">'+t+'</div>'+
      '<div class="scard-price neut">–</div>'+
      '<div class="scard-change neut">–</div>'+
      '<div class="scard-link">↗ Yahoo Finance</div>';
  });
  renderNews([]);
  document.getElementById('hUpdate').textContent='Erste Daten kommen morgen früh um 06:00 Uhr';
}

async function loadData() {
  setDateTime();
  try {
    const r=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('No data.json yet');
    const data=await r.json();
    showUpdateTime(data.generated);
    if(data.forex)   renderForex(data.forex);
    if(data.bitcoin) renderBitcoin(data.bitcoin);
    if(data.stocks)  renderStocks(data.stocks);
    renderNews(data.news||[]);
  } catch(e) {
    showNoData();
    console.log('data.json not yet available:', e.message);
  }
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
