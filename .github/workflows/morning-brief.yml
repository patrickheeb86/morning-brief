name: Morning Brief - Tägliche Aktualisierung

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4.2.2

      - name: Python einrichten
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten generieren und E-Mail senden
        run: python generate.py
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:       ${{ secrets.GMAIL_PASS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

      - name: Dateien ins Repository speichern
        run: |
          git config user.email "actions@github.com"
          git config user.name "Morning Brief Bot"
          git add data.json news_cache.json
          git diff --staged --quiet || git commit -m "Morning Brief $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
